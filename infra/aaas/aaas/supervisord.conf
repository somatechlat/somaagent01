[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
user=appuser

# ═══════════════════════════════════════════════════════════════════════════════
# 1. SOMA BRAIN (Cognitive Core) - Port 9696
# ═══════════════════════════════════════════════════════════════════════════════
[program:somabrain]
command=gunicorn somabrain.config.wsgi:application --bind 0.0.0.0:9696 --workers 2 --timeout 120
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="somabrain.settings.production"

# ═══════════════════════════════════════════════════════════════════════════════
# 2. FRACTAL MEMORY (Vector Store) - Port 10101
# ═══════════════════════════════════════════════════════════════════════════════
[program:somafractalmemory]
command=uvicorn somafractalmemory.config.asgi:application --host 0.0.0.0 --port 10101 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="somafractalmemory.settings",PYTHONPATH="/app/somafractalmemory"

# ═══════════════════════════════════════════════════════════════════════════════
# 3. AGENT 01 (Orchestrator / AAAS) - Port 9000
# ═══════════════════════════════════════════════════════════════════════════════
[program:somaagent]
command=uvicorn services.gateway.asgi:application --host 0.0.0.0 --port 9000 --workers 1
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="services.gateway.settings"

# ═══════════════════════════════════════════════════════════════════════════════
# 4. CONVERSATION WORKER (Kafka consumer for chat messages)
# ═══════════════════════════════════════════════════════════════════════════════
[program:conversation-worker]
command=python -m services.conversation_worker.main
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="services.gateway.settings"

# ═══════════════════════════════════════════════════════════════════════════════
# 5. TOOL EXECUTOR (Kafka consumer for tool execution requests)
# ═══════════════════════════════════════════════════════════════════════════════
[program:tool-executor]
command=python -m services.tool_executor.main
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="services.gateway.settings"

# ═══════════════════════════════════════════════════════════════════════════════
# 6. MEMORY REPLICATOR (Kafka consumer for memory WAL replication)
# ═══════════════════════════════════════════════════════════════════════════════
[program:memory-replicator]
command=python -m services.memory_replicator.main
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="services.gateway.settings"

# ═══════════════════════════════════════════════════════════════════════════════
# 7. DELEGATION WORKER (Kafka consumer for task delegation)
# ═══════════════════════════════════════════════════════════════════════════════
[program:delegation-worker]
command=python -m services.delegation_worker.main
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=DJANGO_SETTINGS_MODULE="services.gateway.settings"
